<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Học Xác suất – Thống kê</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
<style>
:root{
  --ink:#14315B; --royal:#1F4E8C; --teal:#0F6E6E; --amber:#B7791F;
  --wine:#8C2A3A; --forest:#2F6B36;
  --paper:#F4F6FA; --panel:#FFFFFF; --line:#D8E0EC; --line2:#E8EDF4;
  --text:#1B2430; --muted:#5C6B7E; --faint:#8896A8;
  --soft-blue:#EAF1FA; --soft-teal:#E5F2F1; --soft-amber:#FBF3E2;
  --soft-wine:#F8EBEE; --soft-green:#EAF3EB; --soft-gray:#F1F4F8;
  --shadow:0 1px 2px rgba(20,49,91,.04),0 8px 28px rgba(20,49,91,.07);
  --shadow-sm:0 1px 2px rgba(20,49,91,.06);
  --r:14px; --r-sm:10px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:"Be Vietnam Pro",system-ui,sans-serif;
  background:var(--paper); color:var(--text);
  font-size:15px; line-height:1.6; -webkit-font-smoothing:antialiased;
}
.serif{font-family:"Spectral",Georgia,serif}
a{color:var(--royal)}
button{font-family:inherit}

/* ---------- Shell ---------- */
.app{display:flex; min-height:100vh}
.sidebar{
  width:264px; flex-shrink:0; background:var(--ink); color:#E9EEF6;
  display:flex; flex-direction:column; position:sticky; top:0; height:100vh;
}
.brand{padding:22px 22px 16px; border-bottom:1px solid rgba(255,255,255,.09)}
.brand .eyebrow{font-size:10.5px; letter-spacing:.22em; text-transform:uppercase; color:#8FA6C4; font-weight:600}
.brand h1{font-family:"Spectral",serif; font-weight:600; font-size:21px; margin:5px 0 0; line-height:1.15; letter-spacing:.01em}
.brand .sub{font-size:11.5px; color:#9DB2CE; margin-top:5px}
.nav{padding:14px 12px; display:flex; flex-direction:column; gap:2px; overflow-y:auto}
.nav button{
  display:flex; align-items:center; gap:11px; width:100%; text-align:left;
  background:transparent; border:0; color:#C6D3E6; padding:10px 12px;
  border-radius:9px; cursor:pointer; font-size:14px; font-weight:500; transition:.15s;
}
.nav button .ic{width:18px; height:18px; flex-shrink:0; opacity:.85}
.nav button:hover{background:rgba(255,255,255,.07); color:#fff}
.nav button.on{background:var(--teal); color:#fff; box-shadow:inset 0 0 0 1px rgba(255,255,255,.08)}
.nav button.on .ic{opacity:1}
.nav .badge{margin-left:auto; background:var(--amber); color:#fff; font-size:11px; font-weight:700;
  min-width:20px; height:20px; padding:0 6px; border-radius:10px; display:flex; align-items:center; justify-content:center}
.nav .sep{font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:#6F86A6; padding:14px 14px 6px; font-weight:600}
.side-foot{margin-top:auto; padding:14px 18px; border-top:1px solid rgba(255,255,255,.09); font-size:11.5px; color:#8298B6}
.side-foot button{background:none;border:0;color:#9DB2CE;cursor:pointer;font-size:11.5px;text-decoration:underline;padding:0;margin-top:6px}

.main{flex:1; min-width:0; display:flex; flex-direction:column}
.topbar{display:none}
.content{padding:30px 40px 70px; max-width:1080px; width:100%; margin:0 auto}
.view-title{font-family:"Spectral",serif; font-size:30px; font-weight:600; color:var(--ink); margin:0 0 4px; letter-spacing:.01em}
.view-sub{color:var(--muted); margin:0 0 26px; font-size:14.5px}

/* ---------- Dashboard ---------- */
.hero{
  background:linear-gradient(135deg,#16335E 0%,#0F2647 100%); color:#EaF0F8;
  border-radius:20px; padding:30px 34px; display:flex; gap:30px; align-items:center;
  box-shadow:var(--shadow); position:relative; overflow:hidden; flex-wrap:wrap;
}
.hero .curvewrap{flex:1; min-width:300px}
.hero h2{font-family:"Spectral",serif; font-weight:500; font-size:20px; margin:0 0 3px; color:#fff}
.hero .pct{font-family:"Spectral",serif; font-size:54px; font-weight:700; line-height:1; color:#fff; letter-spacing:-.01em}
.hero .pct small{font-size:20px; font-weight:500; color:#A9C0DE; margin-left:4px}
.hero .heronote{font-size:13px; color:#A9C0DE; margin-top:8px; max-width:300px}
.hero svg{display:block; width:100%; height:auto}
.hero .hero-info{flex-shrink:0}

.cards{display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; margin-top:22px}
.stat{background:var(--panel); border:1px solid var(--line); border-radius:var(--r); padding:18px 20px; box-shadow:var(--shadow-sm)}
.stat .k{font-size:12px; color:var(--muted); font-weight:600; letter-spacing:.02em; display:flex; align-items:center; gap:7px}
.stat .v{font-family:"Spectral",serif; font-size:32px; font-weight:600; color:var(--ink); margin-top:6px; line-height:1}
.stat .u{font-size:13px; color:var(--faint); font-weight:500}
.stat .dot{width:9px;height:9px;border-radius:50%}

.panel{background:var(--panel); border:1px solid var(--line); border-radius:var(--r); padding:22px 24px; box-shadow:var(--shadow-sm); margin-top:22px}
.panel h3{font-family:"Spectral",serif; font-size:18px; color:var(--ink); margin:0 0 4px; font-weight:600}
.panel .lead{color:var(--muted); font-size:13.5px; margin:0 0 16px}
.btn{display:inline-flex; align-items:center; gap:8px; background:var(--teal); color:#fff; border:0;
  padding:11px 20px; border-radius:10px; font-weight:600; font-size:14px; cursor:pointer; transition:.15s; box-shadow:var(--shadow-sm)}
.btn:hover{background:#0B5757; transform:translateY(-1px)}
.btn.ghost{background:var(--soft-teal); color:var(--teal)}
.btn.ghost:hover{background:#D5E9E7; transform:none}
.btn.amber{background:var(--amber)} .btn.amber:hover{background:#9C6516}
.btn.ink{background:var(--ink)} .btn.ink:hover{background:#0F2647}
.btn.lg{padding:14px 26px; font-size:15px}
.btn:disabled{opacity:.5; cursor:default; transform:none}

.chaptrack{display:flex; flex-direction:column; gap:9px; margin-top:6px}
.ctrow{display:flex; align-items:center; gap:13px}
.ctrow .name{font-size:13.5px; font-weight:500; width:230px; flex-shrink:0; color:var(--text)}
.ctrow .name small{color:var(--faint); font-weight:500}
.bar{flex:1; height:8px; background:var(--soft-gray); border-radius:5px; overflow:hidden}
.bar i{display:block; height:100%; background:linear-gradient(90deg,var(--teal),#2A8C8C); border-radius:5px; transition:width .5s ease}
.ctrow .num{font-size:12px; color:var(--muted); width:42px; text-align:right; font-variant-numeric:tabular-nums}

/* ---------- Lessons ---------- */
.lessons-layout{display:flex; gap:26px; align-items:flex-start}
.chaplist{width:250px; flex-shrink:0; position:sticky; top:20px}
.chaplist .part{font-size:10.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--faint); font-weight:700; margin:16px 8px 7px}
.chaplist .part:first-child{margin-top:0}
.chaplist button{display:flex; align-items:center; gap:10px; width:100%; text-align:left; background:transparent;
  border:0; padding:9px 12px; border-radius:9px; cursor:pointer; font-size:13.5px; color:var(--text); font-weight:500; transition:.13s}
.chaplist button:hover{background:var(--soft-gray)}
.chaplist button.on{background:var(--ink); color:#fff}
.chaplist .cnum{font-family:"Spectral",serif; font-weight:700; font-size:13px; width:26px; height:26px; flex-shrink:0;
  background:var(--soft-blue); color:var(--royal); border-radius:7px; display:flex; align-items:center; justify-content:center}
.chaplist button.on .cnum{background:rgba(255,255,255,.16); color:#fff}
.chaplist .ck{margin-left:auto; color:var(--forest); font-weight:700; font-size:13px}
.chaplist button.on .ck{color:#9FE3A8}

.reader{flex:1; min-width:0}
.reader .chead{border-bottom:2px solid var(--line); padding-bottom:14px; margin-bottom:8px}
.reader .chead .eb{font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--teal); font-weight:700}
.reader .chead h2{font-family:"Spectral",serif; font-size:27px; color:var(--ink); margin:5px 0 0; font-weight:600}
.sec{margin-top:26px}
.sec h3{font-family:"Spectral",serif; font-size:19px; color:var(--royal); font-weight:600; margin:0 0 10px;
  display:flex; align-items:baseline; gap:9px}
.sec h3 .sn{font-size:13px; color:var(--amber); font-weight:700; font-family:"Be Vietnam Pro"}
.sec p{margin:9px 0}
.sec ul{margin:9px 0; padding-left:22px} .sec li{margin:3px 0}

.box{border-radius:12px; padding:14px 16px 14px; margin:14px 0; border:1px solid; position:relative}
.box .lab{font-size:11px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; display:inline-block; margin-bottom:6px;
  padding:2px 9px; border-radius:20px; color:#fff}
.box .ttl{font-weight:600}
.box.def{background:var(--soft-blue); border-color:#C5D8F0} .box.def .lab{background:var(--royal)}
.box.thm{background:var(--soft-teal); border-color:#BEE0DE} .box.thm .lab{background:var(--teal)}
.box.prop{background:var(--soft-green); border-color:#CAE3CD} .box.prop .lab{background:var(--forest)}
.box.ex{background:var(--soft-amber); border-color:#EAD9B0} .box.ex .lab{background:var(--amber)}
.box.note{background:var(--soft-wine); border-color:#EBC9D1; border-left:4px solid var(--wine)} .box.note .lab{background:var(--wine)}
.box .sol{margin-top:8px; padding-top:8px; border-top:1px dashed rgba(0,0,0,.13)}
.box .sol .st{color:var(--teal); font-style:italic; font-weight:600}
.katex{font-size:1.04em}
.katex-display{margin:.7em 0; overflow-x:auto; overflow-y:hidden; padding:2px 0}

.markdone{display:flex; align-items:center; gap:12px; margin-top:30px; padding-top:20px; border-top:1px solid var(--line)}
.lesson-nav{display:flex; justify-content:space-between; margin-top:18px; gap:10px}
.lesson-nav button{background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:10px 16px; cursor:pointer;
  font-size:13.5px; font-weight:600; color:var(--ink); transition:.13s}
.lesson-nav button:hover:not(:disabled){border-color:var(--teal); color:var(--teal)}
.lesson-nav button:disabled{opacity:.4; cursor:default}

/* ---------- Flashcards ---------- */
.fc-stage{max-width:620px; margin:0 auto}
.fc-meta{display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; color:var(--muted); font-size:13px}
.fc-meta .tag{background:var(--soft-blue); color:var(--royal); padding:4px 11px; border-radius:20px; font-weight:600; font-size:12px}
.flashcard{background:var(--panel); border:1px solid var(--line); border-radius:18px; box-shadow:var(--shadow);
  min-height:280px; display:flex; flex-direction:column; padding:30px 34px; cursor:pointer; position:relative}
.flashcard .side-label{font-size:10.5px; letter-spacing:.18em; text-transform:uppercase; color:var(--faint); font-weight:700}
.flashcard .body{flex:1; display:flex; flex-direction:column; justify-content:center; font-size:17px; text-align:center}
.flashcard .body.q{font-family:"Spectral",serif; color:var(--ink)}
.flashcard .hint{text-align:center; color:var(--faint); font-size:12.5px; margin-top:10px}
.fc-rate{display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-top:18px}
.fc-rate button{border:0; border-radius:11px; padding:13px 8px; cursor:pointer; font-weight:600; font-size:13.5px; color:#fff; transition:.13s;
  display:flex; flex-direction:column; align-items:center; gap:2px}
.fc-rate button small{font-weight:500; font-size:11px; opacity:.85}
.fc-rate button:hover{transform:translateY(-2px); filter:brightness(1.05)}
.fc-rate .again{background:var(--wine)} .fc-rate .hard{background:var(--amber)}
.fc-rate .good{background:var(--teal)} .fc-rate .easy{background:var(--forest)}
.fc-empty{text-align:center; padding:60px 20px; color:var(--muted)}
.fc-empty .big{font-family:"Spectral",serif; font-size:46px; color:var(--forest)}
.deckpick{display:flex; flex-wrap:wrap; gap:9px; margin-bottom:20px}
.deckpick button{background:var(--panel); border:1px solid var(--line); border-radius:20px; padding:7px 15px; cursor:pointer;
  font-size:13px; font-weight:600; color:var(--muted); transition:.13s}
.deckpick button.on{background:var(--ink); color:#fff; border-color:var(--ink)}
.deckpick button:hover:not(.on){border-color:var(--teal)}

/* ---------- Quiz ---------- */
.quiz-stage{max-width:680px; margin:0 auto}
.qprog{height:6px; background:var(--soft-gray); border-radius:4px; overflow:hidden; margin-bottom:22px}
.qprog i{display:block; height:100%; background:var(--amber); transition:width .3s}
.qcard{background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:26px 28px; box-shadow:var(--shadow-sm)}
.qnum{font-size:12px; letter-spacing:.04em; color:var(--amber); font-weight:700; text-transform:uppercase}
.qtext{font-family:"Spectral",serif; font-size:19px; color:var(--ink); margin:8px 0 20px; line-height:1.45}
.opt{display:flex; align-items:center; gap:13px; width:100%; text-align:left; background:var(--panel);
  border:1.5px solid var(--line); border-radius:12px; padding:13px 16px; margin-bottom:11px; cursor:pointer; font-size:15px; transition:.13s; color:var(--text)}
.opt:hover:not(:disabled){border-color:var(--teal); background:var(--soft-teal)}
.opt .key{width:27px; height:27px; flex-shrink:0; border-radius:8px; background:var(--soft-gray); color:var(--muted);
  font-weight:700; display:flex; align-items:center; justify-content:center; font-size:14px}
.opt.correct{border-color:var(--forest); background:var(--soft-green)} .opt.correct .key{background:var(--forest); color:#fff}
.opt.wrong{border-color:var(--wine); background:var(--soft-wine)} .opt.wrong .key{background:var(--wine); color:#fff}
.opt:disabled{cursor:default}
.explain{margin-top:8px; background:var(--soft-blue); border-radius:11px; padding:14px 16px; font-size:14px; border-left:3px solid var(--royal)}
.explain .et{font-weight:700; color:var(--royal); font-size:12px; text-transform:uppercase; letter-spacing:.05em}
.quiz-foot{display:flex; justify-content:space-between; align-items:center; margin-top:18px}
.scoreboard{text-align:center; padding:30px 20px}
.scoreboard .ring{font-family:"Spectral",serif; font-size:64px; font-weight:700; color:var(--ink)}
.scoreboard .msg{font-size:16px; color:var(--muted); margin:6px 0 22px}

/* ---------- Tools ---------- */
.tooltabs{display:flex; gap:8px; margin-bottom:22px; flex-wrap:wrap}
.tooltabs button{background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:10px 18px; cursor:pointer;
  font-weight:600; font-size:13.5px; color:var(--muted); transition:.13s}
.tooltabs button.on{background:var(--teal); color:#fff; border-color:var(--teal)}
.calc{display:grid; grid-template-columns:1fr 1fr; gap:26px; align-items:start}
.calc .field{margin-bottom:16px}
.calc label{display:block; font-size:13px; font-weight:600; color:var(--muted); margin-bottom:6px}
.calc input,.calc select{width:100%; padding:11px 13px; border:1.5px solid var(--line); border-radius:10px; font-size:15px;
  font-family:inherit; color:var(--text); background:var(--panel)}
.calc input:focus,.calc select:focus{outline:0; border-color:var(--teal)}
.result{background:var(--ink); color:#fff; border-radius:14px; padding:20px 22px}
.result .rk{font-size:12px; color:#9DB6D6; font-weight:600; letter-spacing:.03em}
.result .rv{font-family:"Spectral",serif; font-size:38px; font-weight:700; line-height:1.1; margin-top:4px; font-variant-numeric:tabular-nums}
.result .rextra{font-size:13px; color:#A9C0DE; margin-top:8px}
.stattable{width:100%; border-collapse:collapse; font-size:13px; font-variant-numeric:tabular-nums}
.statable-wrap{overflow-x:auto; border:1px solid var(--line); border-radius:12px}
.statable-wrap table{width:100%; border-collapse:collapse}
.statable-wrap th,.statable-wrap td{padding:7px 10px; text-align:center; border-bottom:1px solid var(--line2)}
.statable-wrap th{background:var(--soft-gray); color:var(--ink); font-weight:700; position:sticky; top:0}
.statable-wrap tr:hover td{background:var(--soft-amber)}
.statable-wrap td.dfc{font-weight:700; color:var(--royal); background:var(--soft-blue)}
.hl{background:var(--amber)!important; color:#fff!important; border-radius:5px}
.toolnote{font-size:13px; color:var(--muted); margin-top:16px; background:var(--soft-gray); padding:13px 16px; border-radius:10px}

/* ---------- misc ---------- */
.empty{text-align:center; color:var(--muted); padding:40px}
@media (max-width:860px){
  .sidebar{display:none}
  .topbar{display:flex; align-items:center; gap:14px; background:var(--ink); color:#fff; padding:12px 16px; position:sticky; top:0; z-index:40}
  .topbar h1{font-family:"Spectral",serif; font-size:17px; margin:0; font-weight:600; flex:1}
  .topbar .menu{background:rgba(255,255,255,.12); border:0; color:#fff; width:38px; height:38px; border-radius:9px; font-size:19px; cursor:pointer}
  .drawer{position:fixed; inset:0; z-index:60; display:none}
  .drawer.open{display:block}
  .drawer .scrim{position:absolute; inset:0; background:rgba(8,20,40,.5)}
  .drawer .panel-d{position:absolute; left:0; top:0; bottom:0; width:270px; background:var(--ink); overflow-y:auto}
  .content{padding:20px 16px 60px}
  .lessons-layout{flex-direction:column}
  .chaplist{width:100%; position:static}
  .calc{grid-template-columns:1fr}
  .hero{padding:24px}
  .view-title{font-size:25px}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important; animation:none!important}}
</style>

  <aside class="sidebar">

      <a href="index.html" style="display:inline-block;color:#8FA6C4;text-decoration:none;font-size:11.5px;font-weight:600;letter-spacing:.04em;margin-bottom:8px">← Học Toán</a>
      <div class="eyebrow">Giáo trình</div>

    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="menu" id="menuBtn">☰</button>
      <h1 id="mobileTitle">Tổng quan</h1>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="drawer" id="drawer">
  <div class="scrim" id="scrim"></div>
  <div class="panel-d">
    <div class="brand">
      <div class="eyebrow">Giáo trình</div>
      <h1 class="serif" style="color:#fff;font-size:20px;margin:5px 0 0">Xác suất & Thống kê</h1>
    </div>
    <nav class="nav" id="navMobile"></nav>
  </div>
</div>

<script>
/* ============================================================
   MATH (computed live in-browser)
   ============================================================ */
function erf(x){
  const s=x<0?-1:1; x=Math.abs(x);
  const t=1/(1+0.3275911*x);
  const y=1-(((((1.061405429*t-1.453152027)*t)+1.421413741)*t-0.284496736)*t+0.254829592)*t*Math.exp(-x*x);
  return s*y;
}
function normPDF(z){return Math.exp(-z*z/2)/Math.sqrt(2*Math.PI);}
function normCDF(z){return 0.5*(1+erf(z/Math.SQRT2));}
// Acklam inverse normal
function normInv(p){
  if(p<=0)return -Infinity; if(p>=1)return Infinity;
  const a=[-3.969683028665376e+01,2.209460984245205e+02,-2.759285104469687e+02,1.383577518672690e+02,-3.066479806614716e+01,2.506628277459239e+00];
  const b=[-5.447609879822406e+01,1.615858368580409e+02,-1.556989798598866e+02,6.680131188771972e+01,-1.328068155288572e+01];
  const c=[-7.784894002430293e-03,-3.223964580411365e-01,-2.400758277161838e+00,-2.549732539343734e+00,4.374664141464968e+00,2.938163982698783e+00];
  const d=[7.784695709041462e-03,3.224671290700398e-01,2.445134137142996e+00,3.754408661907416e+00];
  const pl=0.02425, ph=1-pl; let q,r;
  if(p<pl){q=Math.sqrt(-2*Math.log(p));return (((((c[0]*q+c[1])*q+c[2])*q+c[3])*q+c[4])*q+c[5])/((((d[0]*q+d[1])*q+d[2])*q+d[3])*q+1);}
  if(p<=ph){q=p-0.5;r=q*q;return (((((a[0]*r+a[1])*r+a[2])*r+a[3])*r+a[4])*r+a[5])*q/(((((b[0]*r+b[1])*r+b[2])*r+b[3])*r+b[4])*r+1);}
  q=Math.sqrt(-2*Math.log(1-p));return -(((((c[0]*q+c[1])*q+c[2])*q+c[3])*q+c[4])*q+c[5])/((((d[0]*q+d[1])*q+d[2])*q+d[3])*q+1);
}
function fact(n){let r=1;for(let i=2;i<=n;i++)r*=i;return r;}
function nCr(n,k){if(k<0||k>n)return 0;k=Math.min(k,n-k);let r=1;for(let i=0;i<k;i++)r=r*(n-i)/(i+1);return Math.round(r);}
function nPr(n,k){if(k<0||k>n)return 0;let r=1;for(let i=0;i<k;i++)r*=(n-i);return r;}

 {t:"Phép thử và không gian mẫu",h:R`<p><b>Phép thử ngẫu nhiên</b> là một thí nghiệm mà ta không đoán trước được kết quả. Tập hợp mọi kết quả có thể là <b>không gian mẫu</b> \(\Omega\); mỗi phần tử là một <b>biến cố sơ cấp</b>.</p>

 {t:"Phép toán trên biến cố",h:R`<ul><li>Hợp \(A\cup B\): ít nhất một xảy ra.</li><li>Giao \(A\cap B\): cả hai cùng xảy ra.</li><li>Đối \(\bar A=\Omega\setminus A\).</li><li>Xung khắc: \(A\cap B=\varnothing\).</li></ul>

 {t:"Các định nghĩa xác suất",h:R`<div class="box def"><span class="lab">Cổ điển</span> Khi \(\Omega\) có \(n\) kết quả đồng khả năng: \[\P(A)=\frac{\text{số kết quả thuận lợi cho }A}{n}=\frac{|A|}{|\Omega|}.\]</div>

 <div class="box def"><span class="lab">Tiên đề Kolmogorov</span> \(\P(A)\ge0\); \(\P(\Omega)=1\); với \(A_i\) đôi một xung khắc \(\P(\bigcup A_i)=\sum\P(A_i)\). Hệ quả: \(\P(\bar A)=1-\P(A)\).</div>`},

]},
{id:6,part:"PHẦN II · THỐNG KÊ TOÁN HỌC",title:"Thống kê mô tả",sections:[
 {t:"Tổng thể, mẫu, tần số",h:R`<p><b>Tổng thể</b>: toàn bộ đối tượng. <b>Mẫu</b> cỡ \(n\): bộ phận quan sát được. Tần số \(n_i\), tần suất \(f_i=n_i/n\).</p>`},
 {t:"Đặc trưng vị trí trung tâm",h:R`<div class="box def"><span class="lab">Trung bình</span> \(\overline x=\dfrac1n\sum x_i\).</div>
 <div class="box def"><span class="lab">Trung vị · Mốt</span> \(M_e\) = giá trị giữa khi sắp xếp; \(M_o\) = giá trị tần số lớn nhất.</div>
 <div class="box note"><span class="lab">Nhận xét</span> Trung vị bền với giá trị ngoại lai hơn trung bình.</div>`},
 {t:"Đặc trưng độ phân tán",h:R`<div class="box def"><span class="lab">Phương sai mẫu</span> \[s^2=\frac1{n-1}\sum(x_i-\overline x)^2=\frac1{n-1}\Big(\sum x_i^2-n\overline x^2\Big),\quad s=\sqrt{s^2}.\]</div>
 <div class="box def"><span class="lab">Khác</span> Khoảng biến thiên \(R=x_{\max}-x_{\min}\); hệ số biến thiên \(CV=\tfrac s{\overline x}\cdot100\%\); khoảng tứ phân vị \(IQR=Q_3-Q_1\).</div>
 <div class="box ex"><span class="lab">Ví dụ</span> Mẫu \(4,7,7,9,10,13\): \(\overline x\approx8{,}33,\ M_e=8,\ M_o=7,\ s^2\approx9{,}47\).</div>`}
]},
{id:7,part:"PHẦN II · THỐNG KÊ TOÁN HỌC",title:"Mẫu và phân bố mẫu",sections:[
 {t:"Mẫu ngẫu nhiên và thống kê",h:R`<div class="box def"><span class="lab">Định nghĩa</span> Mẫu ngẫu nhiên \((X_1,\dots,X_n)\): độc lập cùng phân bố với tổng thể. Thống kê \(T=g(X_1,\dots,X_n)\) cũng là ĐLNN — có <b>phân bố mẫu</b>.</div>`},
 {t:"Phân bố của trung bình mẫu",h:R`<div class="box thm"><span class="lab">Định lý</span> \(\E\overline X=\mu,\ \Var\overline X=\dfrac{\sigma^2}n\) (sai số chuẩn \(\sigma/\sqrt n\)). Tổng thể chuẩn \(\Rightarrow \overline X\sim N(\mu,\sigma^2/n)\); nói chung \(n\) lớn \(\Rightarrow\) xấp xỉ chuẩn (CLT).</div>
 <div class="box note"><span class="lab">Nhận xét</span> Muốn giảm sai số chuẩn một nửa cần tăng cỡ mẫu 4 lần.</div>`},
 {t:"Các định lý phân bố mẫu (tổng thể chuẩn)",h:R`<div class="box thm"><span class="lab">Phương sai</span> \(\dfrac{(n-1)S^2}{\sigma^2}\sim\chi^2(n-1)\); \(\overline X\) và \(S^2\) độc lập.</div>
 <div class="box thm"><span class="lab">Student</span> \(\sigma\) chưa biết: \(T=\dfrac{\overline X-\mu}{S/\sqrt n}\sim t(n-1)\).</div>
 <div class="box thm"><span class="lab">Tỉ lệ</span> \(n\) lớn: \(\hat p\approx N\!\big(p,\tfrac{p(1-p)}n\big)\).</div>`}
]},
{id:8,part:"PHẦN II · THỐNG KÊ TOÁN HỌC",title:"Ước lượng tham số",sections:[
 {t:"Tiêu chuẩn ước lượng",h:R`<div class="box def"><span class="lab">Định nghĩa</span> Không chệch \(\E\hat\theta=\theta\); hiệu quả = phương sai nhỏ nhất; vững \(\hat\theta\xrightarrow{\P}\theta\).</div>
 <div class="box prop"><span class="lab">Quen thuộc</span> \(\overline X\) không chệch & vững cho \(\mu\); \(S^2\) không chệch cho \(\sigma^2\) (lý do chia \(n-1\)); \(\hat p=m/n\) cho \(p\).</div>`},
 {t:"Phương pháp moment và MLE",h:R`<div class="box def"><span class="lab">Moment</span> Cho moment lý thuyết = moment mẫu rồi giải \(\theta\).</div>
 <div class="box def"><span class="lab">MLE</span> Cực đại hàm hợp lí \(L(\theta)=\prod f(x_i;\theta)\) (thường qua \(\ln L\)).</div>
 <div class="box ex"><span class="lab">Ví dụ</span> Bernoulli: \(\ln L=m\ln p+(n-m)\ln(1-p)\Rightarrow \hat p=m/n\).</div>`},
 {t:"Khoảng tin cậy cho trung bình",h:R`<div class="box thm"><span class="lab">σ biết</span> \[\overline x\pm z_{\alpha/2}\,\frac{\sigma}{\sqrt n},\quad z_{0{,}025}=1{,}96,\ z_{0{,}005}=2{,}576.\]</div>
 <div class="box thm"><span class="lab">σ chưa biết</span> \[\overline x\pm t_{\alpha/2}(n-1)\,\frac{s}{\sqrt n}.\]</div>
 <div class="box ex"><span class="lab">Ví dụ</span> \(n=25,\overline x=20{,}1,s=0{,}4\): \(20{,}1\pm2{,}064\cdot0{,}08=(19{,}94;20{,}27)\).</div>`},
 {t:"KTC cho tỉ lệ, phương sai · cỡ mẫu",h:R`<div class="box thm"><span class="lab">Tỉ lệ</span> \(\hat p\pm z_{\alpha/2}\sqrt{\tfrac{\hat p(1-\hat p)}n}\).</div>
 <div class="box thm"><span class="lab">Phương sai</span> \(\Big(\dfrac{(n-1)s^2}{\chi^2_{\alpha/2}},\dfrac{(n-1)s^2}{\chi^2_{1-\alpha/2}}\Big)\).</div>
 <div class="box thm"><span class="lab">Cỡ mẫu</span> \(n\ge\big(\tfrac{z_{\alpha/2}\sigma}E\big)^2\); cho tỉ lệ \(n\ge\dfrac{z_{\alpha/2}^2\hat p(1-\hat p)}{E^2}\) (xấu nhất \(\hat p=0{,}5\)).</div>`}
]},
{id:9,part:"PHẦN II · THỐNG KÊ TOÁN HỌC",title:"Kiểm định giả thuyết",sections:[
 {t:"Khái niệm cơ bản",h:R`<div class="box def"><span class="lab">Định nghĩa</span> \(H_0\) (giả thuyết không) vs \(H_1\) (đối thuyết). Sai lầm loại I (bác bỏ \(H_0\) đúng) xác suất \(\alpha\) = mức ý nghĩa; loại II (chấp nhận \(H_0\) sai) xác suất \(\beta\); lực kiểm định \(1-\beta\).</div>
 <div class="box note"><span class="lab">Chú ý</span> \(p\text{-value}<\alpha\Rightarrow\) bác bỏ \(H_0\). "Không bác bỏ" \(\ne\) "\(H_0\) đúng".</div>`},
 {t:"Kiểm định trung bình",h:R`<div class="box thm"><span class="lab">Z / t</span> \(\sigma\) biết: \(Z=\dfrac{\overline x-\mu_0}{\sigma/\sqrt n}\); chưa biết: \(T=\dfrac{\overline x-\mu_0}{s/\sqrt n}\sim t(n-1)\). Hai phía: bác bỏ nếu \(|Z|>z_{\alpha/2}\).</div>
 <div class="box ex"><span class="lab">Ví dụ</span> \(\mu_0=1000,n=25,\overline x=970,s=50\): \(T=-3<-t_{0{,}05}(24)=-1{,}711\Rightarrow\) bác bỏ.</div>`},
 {t:"Tỉ lệ, phương sai, hai mẫu",h:R`<div class="box thm"><span class="lab">Tỉ lệ</span> \(Z=\dfrac{\hat p-p_0}{\sqrt{p_0(1-p_0)/n}}\).</div>
 <div class="box thm"><span class="lab">Phương sai</span> \(\chi^2=\dfrac{(n-1)s^2}{\sigma_0^2}\sim\chi^2(n-1)\).</div>
 <div class="box thm"><span class="lab">Hai trung bình</span> \(Z=\dfrac{\overline x_1-\overline x_2}{\sqrt{\sigma_1^2/n_1+\sigma_2^2/n_2}}\).</div>`},
 {t:"Kiểm định χ²",h:R`<div class="box thm"><span class="lab">Phù hợp</span> \(\chi^2=\sum\dfrac{(O_i-E_i)^2}{E_i}\sim\chi^2(k-1-r)\).</div>
 <div class="box thm"><span class="lab">Độc lập</span> Bảng \(r\times c\): \(\chi^2=\sum\dfrac{(O_{ij}-E_{ij})^2}{E_{ij}}\sim\chi^2((r-1)(c-1))\), \(E_{ij}=\dfrac{\text{hàng}_i\cdot\text{cột}_j}{n}\).</div>
 <div class="box ex"><span class="lab">Ví dụ</span> Xúc xắc 120 lần: \(\chi^2=2{,}0<\chi^2_{0{,}05}(5)=11{,}07\Rightarrow\) cân đối.</div>`}
]},
{id:10,part:"PHẦN II · THỐNG KÊ TOÁN HỌC",title:"Tương quan và hồi quy",sections:[
 {t:"Hệ số tương quan mẫu",h:R`<div class="box def"><span class="lab">Định nghĩa</span> \[r=\frac{S_{xy}}{\sqrt{S_{xx}S_{yy}}},\ S_{xy}=\sum x_iy_i-n\overline x\,\overline y,\ S_{xx}=\sum x_i^2-n\overline x^2.\] \(-1\le r\le1\).</div>
 <div class="box note"><span class="lab">Chú ý</span> Tương quan \(\ne\) nhân quả; \(r=0\) chỉ là không có liên hệ <i>tuyến tính</i>.</div>`},
 {t:"Hồi quy tuyến tính đơn",h:R`<div class="box thm"><span class="lab">Bình phương tối thiểu</span> \(\hat y=a+bx\) với \[b=\frac{S_{xy}}{S_{xx}},\quad a=\overline y-b\overline x.\] Đường hồi quy qua \((\overline x,\overline y)\); \(b=r\dfrac{s_y}{s_x}\).</div>
 <div class="box ex"><span class="lab">Ví dụ</span> \(x:1..5,\ y:3,4,6,7,8\Rightarrow \hat y=1{,}7+1{,}3x\); dự báo \(x=6\Rightarrow9{,}5\).</div>`},
 {t:"Đánh giá và dự báo",h:R`<div class="box def"><span class="lab">R²</span> \(R^2=r^2\in[0,1]\): tỉ lệ biến thiên của \(y\) được mô hình giải thích.</div>
 <div class="box thm"><span class="lab">Kiểm định hệ số góc</span> \(T=\dfrac{b}{s_e/\sqrt{S_{xx}}}\sim t(n-2)\), \(s_e^2=\dfrac{S_{yy}-bS_{xy}}{n-2}\).</div>
 <div class="box note"><span class="lab">Nhận xét</span> Ngoại suy ngoài khoảng dữ liệu là rủi ro.</div>`}
]},
{id:11,part:"PHỤ LỤC",title:"Giải tích tổ hợp",sections:[
 {t:"Quy tắc đếm",h:R`<div class="box def"><span class="lab">Cộng / Nhân</span> Cộng: các phương án rời nhau \(n_1+\dots+n_k\). Nhân: các giai đoạn liên tiếp \(n_1\cdots n_k\).</div>`},
 {t:"Hoán vị, chỉnh hợp, tổ hợp",h:R`<div class="box def"><span class="lab">Công thức</span> \[P_n=n!,\quad A_n^k=\frac{n!}{(n-k)!},\quad C_n^k=\binom nk=\frac{n!}{k!(n-k)!}.\]</div>
 <div class="box note"><span class="lab">Chú ý</span> Chỉnh hợp = chọn <i>có thứ tự</i>; tổ hợp = <i>không</i> thứ tự. (Có máy tính ở mục Công cụ.)</div>
 <div class="box ex"><span class="lab">Ví dụ</span> Hộp 7 trắng 3 đen, lấy 4. \(\P(2\text{ trắng})=\dfrac{C_7^2 C_3^2}{C_{10}^4}=\dfrac{63}{210}=0{,}3\).</div>`},
 {t:"Nhị thức Newton",h:R`<div class="box thm"><span class="lab">Newton</span> \[(a+b)^n=\sum_{k=0}^n\binom nk a^{n-k}b^k,\quad \sum_{k=0}^n\binom nk=2^n.\]</div>`}
]},
{id:12,part:"PHỤ LỤC",title:"Bảng tra phân bố",sections:[
 {t:"Cách dùng",h:R`<p>Phụ lục B trong sách gồm bảng \(\Phi(z)\), Student \(t\) và \(\chi^2\). Trong app, các bảng này được <b>tính trực tiếp</b> và tra cứu tương tác ở mục <b>Công cụ</b> trên thanh điều hướng — chính xác hơn bảng in và không cần nội suy thủ công.</p>
 <div class="box note"><span class="lab">Mẹo</span> Phân vị thường dùng: \(z_{0{,}05}=1{,}645,\ z_{0{,}025}=1{,}96,\ z_{0{,}01}=2{,}326,\ z_{0{,}005}=2{,}576\).</div>`}
]}
];

const FLASH=[
 {c:1,f:R`Công thức Bayes cho \(\P(B_k\mid A)\)?`,b:R`\[\P(B_k\mid A)=\frac{\P(B_k)\P(A\mid B_k)}{\sum_i\P(B_i)\P(A\mid B_i)}\]`},
 {c:1,f:R`Xác suất có điều kiện \(\P(A\mid B)\)?`,b:R`\(\P(A\mid B)=\dfrac{\P(A\cap B)}{\P(B)}\). Độc lập \(\iff \P(A\cap B)=\P(A)\P(B)\).`},
 {c:1,f:R`Công thức cộng xác suất?`,b:R`\(\P(A\cup B)=\P(A)+\P(B)-\P(A\cap B)\)`},
 {c:1,f:R`Công thức Bernoulli — đúng \(k\) trong \(n\)?`,b:R`\(\binom nk p^k(1-p)^{n-k}\)`},
 {c:2,f:R`Kỳ vọng & phương sai của \(B(n,p)\)?`,b:R`\(\E X=np,\quad \Var X=np(1-p)\)`},
 {c:2,f:R`Phân bố Poisson \(P(\lambda)\): công thức, \(\E,\Var\)?`,b:R`\(\P(X=k)=\dfrac{\lambda^k e^{-\lambda}}{k!},\quad \E X=\Var X=\lambda\)`},
 {c:2,f:R`Công thức tính nhanh phương sai?`,b:R`\(\Var X=\E X^2-(\E X)^2\)`},
 {c:2,f:R`Phân bố siêu bội \(\P(X=k)\)?`,b:R`\(\dfrac{\binom Kk\binom{N-K}{n-k}}{\binom Nn},\quad \E X=n\frac KN\)`},
 {c:3,f:R`Mật độ phân bố chuẩn \(N(\mu,\sigma^2)\)?`,b:R`\(f(x)=\dfrac1{\sigma\sqrt{2\pi}}e^{-\frac{(x-\mu)^2}{2\sigma^2}}\)`},
 {c:3,f:R`Quy tắc 3σ (3 giá trị)?`,b:R`\(\P(|X-\mu|<\sigma)\approx0{,}683;\ <2\sigma\approx0{,}955;\ <3\sigma\approx0{,}997\)`},
 {c:3,f:R`Phân bố mũ: \(f,F,\E,\Var\)?`,b:R`\(f=\lambda e^{-\lambda x},\ F=1-e^{-\lambda x},\ \E=\tfrac1\lambda,\ \Var=\tfrac1{\lambda^2}\)`},
 {c:3,f:R`Phân bố đều \(U(a,b)\): \(\E,\Var\)?`,b:R`\(\E X=\tfrac{a+b}2,\quad \Var X=\tfrac{(b-a)^2}{12}\)`},
 {c:4,f:R`Hệ số tương quan \(\rho\) theo \(\cov\)?`,b:R`\(\rho=\dfrac{\cov(X,Y)}{\sqrt{\Var X\,\Var Y}},\ \cov=\E(XY)-\E X\E Y\)`},
 {c:4,f:R`\(\Var(X+Y)=?\)`,b:R`\(\Var X+\Var Y+2\cov(X,Y)\). Độc lập \(\Rightarrow\) bỏ số hạng \(\cov\).`},
 {c:5,f:R`Bất đẳng thức Chebyshev?`,b:R`\(\P(|X-\mu|\ge\varepsilon)\le\dfrac{\sigma^2}{\varepsilon^2}\)`},
 {c:5,f:R`Định lý giới hạn trung tâm?`,b:R`\(\dfrac{\overline X_n-\mu}{\sigma/\sqrt n}\xrightarrow{d}N(0,1)\); \(\overline X\approx N(\mu,\sigma^2/n)\)`},
 {c:5,f:R`Khi nào \(B(n,p)\approx N\)? Hiệu chỉnh?`,b:R`Khi \(np,n(1-p)\ge5\): \(N(np,np(1-p))\), dùng hiệu chỉnh liên tục \(\pm0{,}5\).`},
 {c:6,f:R`Phương sai mẫu hiệu chỉnh \(s^2\)?`,b:R`\(s^2=\dfrac1{n-1}\sum(x_i-\overline x)^2\)`},
 {c:7,f:R`Sai số chuẩn của \(\overline X\)?`,b:R`\(\sigma_{\overline X}=\dfrac{\sigma}{\sqrt n}\) — giảm cỡ mẫu 4 lần để giảm nửa sai số.`},
 {c:7,f:R`Phân bố của \(\dfrac{(n-1)S^2}{\sigma^2}\)?`,b:R`\(\chi^2(n-1)\). Và \(\dfrac{\overline X-\mu}{S/\sqrt n}\sim t(n-1)\).`},
 {c:8,f:R`KTC cho \(\mu\) khi \(\sigma\) chưa biết?`,b:R`\(\overline x\pm t_{\alpha/2}(n-1)\dfrac s{\sqrt n}\)`},
 {c:8,f:R`Cỡ mẫu ước lượng tỉ lệ (sai số \(E\))?`,b:R`\(n\ge\dfrac{z_{\alpha/2}^2\hat p(1-\hat p)}{E^2}\), xấu nhất \(\hat p=0{,}5\)`},
 {c:8,f:R`Ba tiêu chuẩn của ước lượng tốt?`,b:R`Không chệch (\(\E\hat\theta=\theta\)), hiệu quả (phương sai nhỏ nhất), vững (\(\hat\theta\xrightarrow{\P}\theta\)).`},
 {c:9,f:R`Sai lầm loại I và loại II?`,b:R`Loại I: bác bỏ \(H_0\) đúng (xs \(\alpha\)). Loại II: giữ \(H_0\) sai (xs \(\beta\)). Lực \(=1-\beta\).`},
 {c:9,f:R`Thống kê kiểm định \(\mu\) khi \(\sigma\) chưa biết?`,b:R`\(T=\dfrac{\overline x-\mu_0}{s/\sqrt n}\sim t(n-1)\). Bác bỏ nếu \(|T|>t_{\alpha/2}\).`},
 {c:9,f:R`Thống kê χ² kiểm định phù hợp?`,b:R`\(\chi^2=\sum\dfrac{(O_i-E_i)^2}{E_i}\sim\chi^2(k-1-r)\)`},
 {c:10,f:R`Hệ số góc \(b\) trong hồi quy LSQ?`,b:R`\(b=\dfrac{S_{xy}}{S_{xx}}=r\dfrac{s_y}{s_x},\quad a=\overline y-b\overline x\)`},
 {c:10,f:R`Ý nghĩa \(R^2\)?`,b:R`\(R^2=r^2\): tỉ lệ biến thiên của \(y\) được mô hình tuyến tính giải thích.`},
 {c:11,f:R`Phân biệt \(A_n^k\) và \(C_n^k\)?`,b:R`\(A_n^k=\dfrac{n!}{(n-k)!}\) (có thứ tự); \(C_n^k=\dfrac{n!}{k!(n-k)!}\) (không thứ tự).`},
 {c:11,f:R`Nhị thức Newton?`,b:R`\((a+b)^n=\sum_{k=0}^n\binom nk a^{n-k}b^k\)`}
];

function drawHeroCurve(p){
  // shade central area = p ; z bound such that area between [-z,z]=p
  const W=420,H=200,pad=14;
  const xmin=-3.4,xmax=3.4;
  const X=x=>pad+(x-xmin)/(xmax-xmin)*(W-2*pad);
  const Ymax=normPDF(0)*1.12;
  const Y=y=>H-pad-(y/Ymax)*(H-2*pad);
  let curve=''; const N=120;
  for(let i=0;i<=N;i++){const x=xmin+(xmax-xmin)*i/N; curve+=(i?'L':'M')+X(x).toFixed(1)+' '+Y(normPDF(x)).toFixed(1)+' ';}
  let z=p>=1?xmax:(p<=0?0:Math.min(normInv((1+p)/2),xmax));
  let fill='M'+X(-z).toFixed(1)+' '+Y(0)+' ';
  for(let i=0;i<=N;i++){const x=-z+(2*z)*i/N; fill+='L'+X(x).toFixed(1)+' '+Y(normPDF(x)).toFixed(1)+' ';}
  fill+='L'+X(z).toFixed(1)+' '+Y(0)+' Z';
  const ax=Y(0);
  document.getElementById('curvewrap').innerHTML=`
  <svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Đường cong chuẩn với vùng tô thể hiện tiến độ">
    <line x1="${pad}" y1="${ax}" x2="${W-pad}" y2="${ax}" stroke="rgba(255,255,255,.25)" stroke-width="1"/>
    <path d="${fill}" fill="rgba(95,196,190,.55)"/>
    <path d="${curve}" fill="none" stroke="#9FE3DE" stroke-width="2.4"/>
    <line x1="${X(0)}" y1="${ax}" x2="${X(0)}" y2="${Y(normPDF(0))}" stroke="rgba(255,255,255,.35)" stroke-dasharray="3 3"/>
  </svg>`;
}

/* ---------- Flashcards (SM-2 lite) ---------- */
function deckCards(){
  return FLASH.map((c,i)=>({...c,idx:i}))
    .filter(c=>deckFilter==='all'||c.c===+deckFilter);
}
function nextDue(){
  const now=Date.now();
  const pool=deckCards().filter(c=>{const s=progress.srs['f'+c.idx];return !s||s.due<=now;});
  if(pool.length===0)return null;
  // earliest due / new first
  pool.sort((a,b)=>{const sa=progress.srs['f'+a.idx],sb=progress.srs['f'+b.idx];return (sa?sa.due:0)-(sb?sb.due:0);});
  return pool[0];
}
function renderFlash(){
  el.innerHTML=`<h2 class="view-title">Thẻ ghi nhớ</h2>
    <p class="view-sub">Lặp lại ngắt quãng (SM-2): đánh giá độ nhớ, hệ thống tự xếp lịch ôn.</p>
    <div class="deckpick" id="deckpick"></div>
    <div class="fc-stage" id="fcstage"></div>`;
  const dp=document.getElementById('deckpick');
  const mk=(v,l)=>{const b=document.createElement('button');b.className=(deckFilter===v?'on':'');b.textContent=l;b.onclick=()=>{deckFilter=v;fcShowBack=false;fcCurrent=null;renderFlash();};dp.appendChild(b);};
  mk('all','Tất cả');
  CH.forEach(c=>{ if(FLASH.some(f=>f.c===c.id)) mk(String(c.id), (c.part==='PHỤ LỤC'?'PL ':'Ch')+c.id); });
  drawFlash();
}
function drawFlash(){
  const stage=document.getElementById('fcstage');
  if(!fcCurrent)fcCurrent=nextDue();
  if(!fcCurrent){
    stage.innerHTML=`<div class="fc-empty"><div class="big">✓</div><p>Không còn thẻ đến hạn trong bộ này. Quay lại sau hoặc chọn bộ khác.</p>
      <button class="btn ghost" id="studyAll">Ôn lại toàn bộ bộ này</button></div>`;
    const sa=document.getElementById('studyAll');
    if(sa)sa.onclick=()=>{ // reset due of this deck to now
      deckCards().forEach(c=>{const k='f'+c.idx;const s=progress.srs[k];if(s){s.due=Date.now();}});
      saveProgress();fcCurrent=null;drawFlash();updateBadges();};
    return;
  }
  const c=fcCurrent;
  const total=deckCards().length;
  const due=deckCards().filter(x=>{const s=progress.srs['f'+x.idx];return !s||s.due<=Date.now();}).length;
  stage.innerHTML=`
    <div class="fc-meta"><span class="tag">Ch ${c.c}</span><span>${due} thẻ đến hạn · ${total} thẻ trong bộ</span></div>
    <div class="flashcard" id="card">
      <div class="side-label">${fcShowBack?'Trả lời':'Câu hỏi'}</div>
      <div class="body ${fcShowBack?'':'q'}" id="cardbody">${fcShowBack?c.b:c.f}</div>
      <div class="hint">${fcShowBack?'Bạn nhớ tốt đến đâu?':'Chạm để xem đáp án'}</div>
    </div>
    ${fcShowBack?`<div class="fc-rate">
      <button class="again" data-q="0">Quên<small>&lt;1 phút</small></button>
      <button class="hard" data-q="1">Khó<small>sớm</small></button>
      <button class="good" data-q="2">Tốt<small>+lịch</small></button>
      <button class="easy" data-q="3">Dễ<small>++lịch</small></button>
    </div>`:''}`;
  renderMath(stage);
  const card=document.getElementById('card');
  card.onclick=()=>{if(!fcShowBack){fcShowBack=true;drawFlash();}};
  stage.querySelectorAll('[data-q]').forEach(b=>{b.onclick=()=>rate(c.idx,+b.dataset.q);});
}
function rate(idx,q){
  const k='f'+idx; const now=Date.now(); const DAY=86400000;
  let s=progress.srs[k]||{ease:2.5,interval:0,reps:0,due:now};
  if(q===0){s.reps=0;s.interval=0;s.due=now+60000;} // 1 min
  else{
    s.reps++;
    if(s.reps===1)s.interval=q===3?2:1;
    else if(s.reps===2)s.interval=q===1?3:6;
    else s.interval=Math.round(s.interval*s.ease);
    s.ease=Math.max(1.3, s.ease + (0.1-(3-q)*(0.08+(3-q)*0.02)));
    if(q===1)s.interval=Math.max(1,Math.round(s.interval*0.6));
    s.due=now+s.interval*DAY;
  }
  progress.srs[k]=s; saveProgress();
  fcShowBack=false; fcCurrent=null; drawFlash(); updateBadges();
}

  let html=`<div class="qnum">Câu ${quizIdx+1}</div><div class="qtext">${q.q}</div>`;
  q.o.forEach((opt,i)=>{
    let cls='opt';
    if(quizAnswered){if(i===q.a)cls+=' correct';else if(i===quizPick)cls+=' wrong';}
    html+=`<button class="${cls}" data-i="${i}" ${quizAnswered?'disabled':''}><span class="key">${'ABCD'[i]}</span><span>${opt}</span></button>`;
  });
  if(quizAnswered)html+=`<div class="explain"><div class="et">${quizPick===q.a?'Chính xác':'Giải thích'}</div>${q.e}</div>`;
  qc.innerHTML=html;
  renderMath(qc);
  qc.querySelectorAll('[data-i]').forEach(b=>{b.onclick=()=>{
    if(quizAnswered)return;
    quizPick=+b.dataset.i; quizAnswered=true;
    if(quizPick===q.a)quizScore++;
    renderQuiz();
  };});
  document.getElementById('qquit').onclick=()=>{quizList=[];quizDone=false;render();};
  document.getElementById('qnext').onclick=()=>{
    if(!quizAnswered)return;
    if(quizIdx===quizList.length-1)finishQuiz();
    else{quizIdx++;quizAnswered=false;quizPick=-1;renderQuiz();window.scrollTo(0,0);}
  };
}
function renderQuizPick(){
  el.innerHTML=`<h2 class="view-title">Trắc nghiệm</h2>
   <p class="view-sub">Chọn phạm vi. Mỗi đề xáo trộn thứ tự câu hỏi.</p>
   <div class="panel"><h3>Chọn đề</h3>
   <div class="deckpick" id="qpick"></div>
   <button class="btn lg" id="qstart">Bắt đầu →</button></div>`;
  const qp=document.getElementById('qpick');
  const mk=(v,l)=>{const b=document.createElement('button');b.className=(quizChap===v?'on':'');b.textContent=l;b.onclick=()=>{quizChap=v;renderQuizPick();};qp.appendChild(b);};
  mk('all','Tổng hợp (tất cả)');
  CH.forEach(c=>{if(QUIZ.some(q=>q.c===c.id))mk(String(c.id),(c.part==='PHỤ LỤC'?'PL ':'Ch ')+c.id+'. '+c.title);});
  document.getElementById('qstart').onclick=()=>{
    let list=QUIZ.map((q,i)=>({...q,gi:i})).filter(q=>quizChap==='all'||q.c===+quizChap);
    for(let i=list.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[list[i],list[j]]=[list[j],list[i]];}
    quizList=list;quizIdx=0;quizScore=0;quizAnswered=false;quizPick=-1;quizDone=false;
    renderQuiz();
  };
}
function finishQuiz(){
  const key=quizChap==='all'?'all':('c'+quizChap);
  const rec=progress.quiz[key]||{correct:0,total:0,best:0};
  rec.correct+=quizScore;rec.total+=quizList.length;
  rec.best=Math.max(rec.best,Math.round(100*quizScore/quizList.length));
  progress.quiz[key]=rec;saveProgress();
  quizDone=true;renderQuiz();
}
function renderScore(){
  const pct=Math.round(100*quizScore/quizList.length);
  const msg=pct>=90?'Xuất sắc! Bạn nắm rất chắc.':pct>=70?'Tốt — ôn lại vài câu sai là ổn.':pct>=50?'Khá ổn, cần luyện thêm.':'Hãy xem lại bài học rồi thử lại nhé.';
  el.innerHTML=`<h2 class="view-title">Kết quả</h2><p class="view-sub">${quizChap==='all'?'Đề tổng hợp':'Chương '+quizChap}</p>
   <div class="panel scoreboard">
     <div class="ring">${quizScore}<span style="color:var(--faint);font-size:34px">/${quizList.length}</span></div>
     <div class="msg">${pct}% đúng — ${msg}</div>
     <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
       <button class="btn" id="again">Làm lại</button>
       <button class="btn ghost" id="other">Chọn đề khác</button>
     </div>
   </div>`;
  document.getElementById('again').onclick=()=>{
    for(let i=quizList.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[quizList[i],quizList[j]]=[quizList[j],quizList[i]];}
    quizIdx=0;quizScore=0;quizAnswered=false;quizPick=-1;quizDone=false;renderQuiz();
  };
  document.getElementById('other').onclick=()=>{quizList=[];quizDone=false;render();};
}

/* ---------- Tools ---------- */
function renderTools(){
  el.innerHTML=`<h2 class="view-title">Công cụ tra cứu</h2>
   <p class="view-sub">Máy tính phân bố chuẩn (tính trực tiếp) và bảng tra t, χ², tổ hợp.</p>
   <div class="tooltabs" id="tooltabs"></div>
   <div class="panel" id="toolbody"></div>`;
  const tt=document.getElementById('tooltabs');
  [['normal','Phân bố chuẩn Φ(z)'],['t','Bảng Student t'],['chi','Bảng χ²'],['combo','Tổ hợp']].forEach(([v,l])=>{
    const b=document.createElement('button');b.className=(toolTab===v?'on':'');b.textContent=l;b.onclick=()=>{toolTab=v;renderTools();};tt.appendChild(b);
  });
  if(toolTab==='normal')toolNormal();
  else if(toolTab==='t')toolT();
  else if(toolTab==='chi')toolChi();
  else toolCombo();
}
function toolNormal(){
  const tb=document.getElementById('toolbody');
  tb.innerHTML=`<h3>Phân bố chuẩn</h3><p class="lead">Tính \\(\\Phi(z)=\\P(Z<z)\\) xuôi và ngược, hoặc xác suất \\(\\P(a<X<b)\\) cho \\(N(\\mu,\\sigma^2)\\).</p>
   <div class="calc">
     <div>
       <div class="field"><label>Tính Φ(z) — nhập z</label><input id="zin" type="number" step="0.01" value="1.96"></div>
       <div class="result"><div class="rk">Φ(z) = P(Z &lt; z)</div><div class="rv" id="zout">—</div><div class="rextra" id="zextra"></div></div>
       <div style="height:18px"></div>
       <div class="field"><label>Tìm z ngược — nhập xác suất p ∈ (0,1)</label><input id="pin" type="number" step="0.01" min="0.001" max="0.999" value="0.975"></div>
       <div class="result" style="background:var(--teal)"><div class="rk">z sao cho Φ(z)=p</div><div class="rv" id="pout">—</div></div>
     </div>
     <div>
       <div class="field"><label>P(a &lt; X &lt; b) với X ~ N(μ, σ²)</label></div>
       <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
         <div class="field"><label>μ</label><input id="mu" type="number" value="0"></div>
         <div class="field"><label>σ</label><input id="sg" type="number" value="1" step="0.1"></div>
         <div class="field"><label>a</label><input id="aa" type="number" value="-1.96"></div>
         <div class="field"><label>b</label><input id="bb" type="number" value="1.96"></div>
       </div>
       <div class="result" style="background:var(--amber)"><div class="rk">P(a &lt; X &lt; b)</div><div class="rv" id="about">—</div><div class="rextra" id="abextra"></div></div>
     </div>
   </div>
   <div class="toolnote">Φ(z) tính bằng xấp xỉ hàm sai số erf (sai số &lt; 1,5·10⁻⁷). Một số mốc: Φ(1,645)=0,95 · Φ(1,96)=0,975 · Φ(2,576)=0,995.</div>`;
  renderMath(tb);
  const upd=()=>{
    const z=parseFloat(document.getElementById('zin').value);
    if(!isNaN(z)){document.getElementById('zout').textContent=normCDF(z).toFixed(4).replace('.',',');
      document.getElementById('zextra').textContent='P(Z>z)='+(1-normCDF(z)).toFixed(4).replace('.',',');}
    const p=parseFloat(document.getElementById('pin').value);
    if(!isNaN(p)&&p>0&&p<1)document.getElementById('pout').textContent=normInv(p).toFixed(4).replace('.',',');
    const mu=parseFloat(document.getElementById('mu').value),sg=parseFloat(document.getElementById('sg').value),
          a=parseFloat(document.getElementById('aa').value),b=parseFloat(document.getElementById('bb').value);
    if(!isNaN(mu)&&!isNaN(sg)&&sg>0&&!isNaN(a)&&!isNaN(b)){
      const pr=normCDF((b-mu)/sg)-normCDF((a-mu)/sg);
      document.getElementById('about').textContent=pr.toFixed(4).replace('.',',');
      document.getElementById('abextra').textContent='z: ['+((a-mu)/sg).toFixed(2).replace('.',',')+' ; '+((b-mu)/sg).toFixed(2).replace('.',',')+']';
    }
  };
  tb.querySelectorAll('input').forEach(i=>i.addEventListener('input',upd));
  upd();
}
function statTable(alphas,table,label,desc){
  const tb=document.getElementById('toolbody');
  let html=`<h3>${label}</h3><p class="lead">${desc}</p>
   <div class="field" style="max-width:260px"><label>Tô sáng cột α</label><select id="alphasel">`;
  alphas.forEach((a,i)=>html+=`<option value="${i}">α = ${String(a).replace('.',',')}</option>`);
  html+=`</select></div><div class="statable-wrap"><table><thead><tr><th>n \\ α</th>`;
  alphas.forEach(a=>html+=`<th>${String(a).replace('.',',')}</th>`);
  html+=`</tr></thead><tbody>`;
  Object.keys(table).forEach(df=>{
    html+=`<tr><td class="dfc">${df}</td>`;
    table[df].forEach((v,i)=>html+=`<td data-col="${i}">${v.toFixed(3).replace('.',',')}</td>`);
    html+=`</tr>`;
  });
  html+=`</tbody></table></div>`;
  tb.innerHTML=html;
  const sel=document.getElementById('alphasel');
  const hl=()=>{const c=+sel.value;tb.querySelectorAll('td[data-col]').forEach(td=>{td.classList.toggle('hl',+td.dataset.col===c);});};
  sel.onchange=hl;hl();
}
function toolT(){statTable(STATS.t_alphas,STATS.t_table,'Bảng Student t — tₐ(n)','Giá trị tₐ(n) thoả P(T > tₐ(n)) = α. Hàng n = bậc tự do.');}
function toolChi(){statTable(STATS.chi_alphas,STATS.chi_table,'Bảng χ² — χ²ₐ(n)','Giá trị χ²ₐ(n) thoả P(χ² > χ²ₐ(n)) = α. Hàng n = bậc tự do.');}
function toolCombo(){
  const tb=document.getElementById('toolbody');
  tb.innerHTML=`<h3>Giải tích tổ hợp</h3><p class="lead">Tính giai thừa, hoán vị, chỉnh hợp \\(A_n^k\\), tổ hợp \\(C_n^k\\).</p>
   <div class="calc">
     <div>
       <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
         <div class="field"><label>n</label><input id="cn" type="number" min="0" value="10"></div>
         <div class="field"><label>k</label><input id="ck" type="number" min="0" value="3"></div>
       </div>
     </div>
     <div>
       <div class="result"><div class="rk">Tổ hợp Cₙᵏ (không thứ tự)</div><div class="rv" id="rc">—</div></div>
       <div style="height:12px"></div>
       <div class="result" style="background:var(--teal)"><div class="rk">Chỉnh hợp Aₙᵏ (có thứ tự)</div><div class="rv" id="ra">—</div></div>
       <div style="height:12px"></div>
       <div class="result" style="background:var(--amber)"><div class="rk">Giai thừa n!</div><div class="rv" id="rf">—</div></div>
     </div>
   </div>
   <div class="toolnote">Cₙᵏ = n! / [k!(n−k)!] · Aₙᵏ = n!/(n−k)! · với n lớn kết quả hiển thị dạng xấp xỉ.</div>`;
  renderMath(tb);
  const fmt=x=>{if(x===Infinity||x>1e15)return x.toExponential(3).replace('.',',');return x.toLocaleString('vi-VN');};
  const upd=()=>{
    const n=parseInt(document.getElementById('cn').value),k=parseInt(document.getElementById('ck').value);
    if(isNaN(n)||isNaN(k)){return;}
    document.getElementById('rc').textContent=(k>=0&&k<=n)?fmt(nCr(n,k)):'—';
    document.getElementById('ra').textContent=(k>=0&&k<=n)?fmt(nPr(n,k)):'—';
    document.getElementById('rf').textContent=(n>=0&&n<=170)?fmt(fact(n)):'quá lớn';
  };
  tb.querySelectorAll('input').forEach(i=>i.addEventListener('input',upd));
  upd();
}

/* ---------- KaTeX render ---------- */
const KMACROS={
  "\\P":"\\mathsf{P}",
  "\\E":"\\operatorname{E}",
  "\\Var":"\\operatorname{D}",
  "\\cov":"\\operatorname{cov}",
  "\\given":"\\mid"
};
function renderMath(node){
  if(window.renderMathInElement){
    try{renderMathInElement(node,{delimiters:[
      {left:'\\[',right:'\\]',display:true},
      {left:'\\(',right:'\\)',display:false}
    ],macros:KMACROS,throwOnError:false});}catch(e){}
  }
}

/* ---------- Router ---------- */
function render(){
  buildNav(document.getElementById('nav'));
  buildNav(document.getElementById('navMobile'));
  document.getElementById('mobileTitle').textContent=(NAV.find(n=>n.id===view)||{}).label||'';
  if(view==='dash')renderDash();
  else if(view==='lessons')renderLessons();
  else if(view==='flash')renderFlash();
  else if(view==='quiz')renderQuiz();
  else if(view==='tools')renderTools();
  window.scrollTo(0,0);
}

document.getElementById('menuBtn').onclick=()=>document.getElementById('drawer').classList.add('open');
document.getElementById('scrim').onclick=closeDrawer;
document.getElementById('resetBtn').onclick=async()=>{
  if(confirm('Xoá toàn bộ tiến độ học (mục đã học, lịch thẻ, điểm trắc nghiệm)?')){
    progress={learned:{},srs:{},quiz:{}};await saveProgress();fcCurrent=null;fcShowBack=false;render();
  }
};

/* ---------- boot ---------- */
(async function(){
  await loadProgress();
  // wait briefly for KaTeX auto-render to be available
  let tries=0;(function waitK(){if(window.renderMathInElement||tries>20){render();}else{tries++;setTimeout(waitK,80);}})();
})();
</script>
